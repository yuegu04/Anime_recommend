# 动漫推荐系统 · Nginx 站点配置
# 用法：复制到 /etc/nginx/sites-available/anime，软链到 sites-enabled，然后 nginx -t && systemctl reload nginx
# 说明：前端静态文件放 /var/www/anime；后端只监听 127.0.0.1:8000，由本配置反代。

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;   # 公网 IP 或域名都生效；备案后改成你的域名即可

    root /var/www/anime;
    index index.html;

    # 本地化后的封面图（由 localize_covers.py 下载到 /var/www/covers）
    # 独立目录，前端 dist 重新部署不会被清掉；长缓存加速
    location /covers/ {
        alias /var/www/covers/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # 前端 SPA：找不到文件时回退到 index.html（支持 vue-router history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反代（与后端路由前缀一致：/auth /media /recommend）
    location /auth/ {
        proxy_pass http://127.0.0.1:8000;
    }
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
    }
    location /recommend/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # 反代通用请求头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 上传/响应体大小（封面图等，按需调大）
    client_max_body_size 10m;
}

